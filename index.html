<html>

  <!DOCTYPE html>
<html>
<head>
    <title>sol empire : SOLai v3</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; text-align: center; }
        #terminal { border: 2px solid #0f0; padding: 20px; width: 85%; margin: 20px auto; min-height: 150px; text-align: left; border-radius: 10px; box-shadow: 0 0 20px #0f0; }
        input { background: #111; color: #0f0; border: 1px solid #0f0; padding: 12px; width: 65%; font-size: 16px; border-radius: 5px; }
        button { background: #0f0; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>SOL NET : THE AI</h1>
    <p>status: <span id="status">scanning...</span></p>
    
    <input type="text" id="userInput" placeholder="command your question...">
    <button onclick="askSol()">execute</button>
    
    <div id="terminal">sol-core online... awaiting orders...</div>

    <script>
        // Your key is braw, we just need the 2026 model name
        const MY_KEY = "AIzaSyC_8VUAc0flfslg1nRO0Oq-QMzE6NlR9a8";

        async function askSol() {
            const prompt = document.getElementById('userInput').value;
            const output = document.getElementById('terminal');
            
            if (!prompt) return;
            output.innerText = "calculating with gemini 3 flash...";

            try {
                // CHANGED: Using gemini-3-flash-preview and v1beta
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${MY_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "You are an excellent AI. Use slang like 'bro' and 'it's W'. Answer this for the bro: " + prompt }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    output.innerText = data.candidates[0].content.parts[0].text;
                    document.getElementById('status').innerText = "connected";
                } else {
                    // This shows exactly what went wrong if it fails again
                    output.innerText = "matrix error: " + (data.error ? data.error.message : "something glitched bro");
                }
            } catch (err) {
                output.innerText = "system crash: " + err;
            }
        }
    </script>
</body>
